<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Know Weather</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom border-bottom">
<div class="container-fluid">

<a class="navbar-brand d-flex align-items-center gap-2" href="#">
<i data-lucide="cloud-sun"></i>
Know Weather
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
data-bs-target="#navbarSupportedContent">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarSupportedContent">

<ul class="navbar-nav me-auto"></ul>

<form class="d-flex align-items-center gap-2">

<input id="City" class="form-control" type="search" placeholder="Enter city name">

<button class="btn btn-search d-flex align-items-center gap-2"
type="button" id="submit">

<i data-lucide="search"></i>
Search

</button>

</form>
</div>
</div>
</nav>


<div class="hero-wrap">

<div class="container my-4">

<h1 class="page-title text-center" id="pageTitle">Welcome</h1>

<div class="card weather-card border-0">

<img src="sunny.jpg" class="card-img-top" alt="Weather">

<div class="card-body">
<h5 class="card-title"></h5>
<p class="card-text text-center text-muted mb-0">
Weather information
</p>
</div>

<ul class="list-group list-group-flush">

<li class="list-group-item">
Temperature :
<span id="temperature"></span>
</li>

<li class="list-group-item">
Wind Speed :
<span id="wind"></span>
</li>

<li class="list-group-item">
Humidity :
<span id="humidity"></span>
</li>

</ul>
</div>
</div>


<div class="text-center mb-4">

<button id="speak-weather" class="btn btn-speak">

Read Weather Information

</button>

</div>

</div>


<footer class="footer-section">

<div class="container">

<div class="card guide-card border-0">

<div class="card-header text-center">
RRK
</div>

<div class="card-body text-center">

<h5 class="card-title">
Guide
</h5>

<p class="card-text text-muted">
To know how to get your city weather click below.
</p>

<a href="guide.html" class="btn btn-primary">

Click Here

</a>

</div>
</div>

</div>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script>

lucide.createIcons();

function speakWeatherInfo(){

const temperature = document.getElementById('temperature').textContent;
const wind = document.getElementById('wind').textContent;
const humidity = document.getElementById('humidity').textContent;

const speechText =
`Temperature ${temperature}, Wind Speed ${wind}, Humidity ${humidity}`;

const utterance = new SpeechSynthesisUtterance(speechText);

window.speechSynthesis.speak(utterance);

}

document
.getElementById('speak-weather')
.addEventListener('click', speakWeatherInfo);

</script>

</body>
</html>
