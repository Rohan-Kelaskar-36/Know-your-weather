<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Know Weather</title>

  <!-- Bootstrap & Custom Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: #fff;
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .card-title, .list-group-item {
      color: #fff;
    }

    .list-group-item {
      background: transparent;
      border: none;
    }

    .navbar-brand {
      font-weight: 600;
      color: #87f17f !important;
      font-size: 1.5rem;
    }

    #cityName {
      color: #ffc107;
    }

    .btn-glow {
      background-color: #ffc107;
      color: black;
      font-weight: bold;
      border: none;
    }

    .btn-glow:hover {
      background-color: #e0a800;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: #ccc;
      margin-top: 4rem;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Know Weather</a>
      <form class="d-flex ms-auto" role="search">
        <input id="City" class="form-control me-2" type="search" placeholder="Enter city..." aria-label="Search"/>
        <button class="btn btn-outline-light" type="button" id="submit">Search</button>
      </form>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container py-5">
    <h1 class="text-center mb-5">Weather of <span id="cityName">...</span></h1>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card glass-card p-3 text-center">
          <img src="sunny.jpg" class="card-img-top rounded" alt="Weather Image" />
          <div class="card-body">
            <h5 class="card-title">Current Conditions</h5>
            <ul class="list-group list-group-flush mt-3">
              <li class="list-group-item">🌡️ Temperature: <span id="temperature">--</span></li>
              <li class="list-group-item">🌬️ Wind Speed: <span id="wind">--</span></li>
              <li class="list-group-item">💧 Humidity: <span id="humidity">--</span></li>
            </ul>
            <button id="speak-weather" class="btn btn-glow mt-4">🔊 Read Weather Info</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Guide Section -->
    <div class="row mt-5">
      <div class="col-md-6 mx-auto">
        <div class="card text-dark text-center">
          <div class="card-header fw-bold">RRK</div>
          <div class="card-body">
            <h5 class="card-title">Need Help?</h5>
            <p class="card-text">Click below to learn how to check your city’s weather.</p>
            <a href="guide.html" class="btn btn-primary">Guide</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>&copy; 2025 Know Weather </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <!-- Weather TTS Script -->
  <script>
    function speakWeatherInfo() {
      const temperature = document.getElementById('temperature').textContent;
      const wind = document.getElementById('wind').textContent;
      const humidity = document.getElementById('humidity').textContent;

      const speechText = `Here's the current weather. Temperature is ${temperature}, Wind Speed is ${wind}, and Humidity is ${humidity}.`;
      const utterance = new SpeechSynthesisUtterance(speechText);
      utterance.lang = 'en-US';
      window.speechSynthesis.speak(utterance);
    }

    document.getElementById('speak-weather').addEventListener('click', speakWeatherInfo);
  </script>
</body>
</html>
