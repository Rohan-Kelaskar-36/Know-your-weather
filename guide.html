<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide – Know Weather</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="guide-hero">
    <div class="container py-4">
      <div class="card guide-content-card border-0">
        <img src="cartoon-sun.jpg" class="card-img-top" alt="Guide" style="height: 12rem; object-fit: cover;">
        <div class="card-body text-center">
          <span id="element" class="text-uppercase fw-bold small text-body"></span>
        </div>
      </div>
    </div>
  </div>

 
    

  <footer class="footer-section">

    <div class="container">
    
    <div class="card guide-card border-0">
    
      <div class="card-header text-center d-flex align-items-center justify-content-center gap-2">
        <i data-lucide="user" class="lucide"></i>
        RRK
      </div>
    
    <div class="card-body text-center">
    
      <h5 class="card-title d-flex align-items-center justify-content-center gap-2">
        <i data-lucide="cloud-sun" class="lucide"></i>
        Know Weather
      </h5>
    
    <p class="card-text text-muted">
      To know your city weather click "GO BACK" button.
    </p>
    
    <a href="index.html" class="btn btn-primary">
    
    Go Back
    
    </a>
    
    </div>
    </div>
    
    </div>
    
    </footer>
  
    
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
  <script>
    lucide.createIcons();
    var strings = [
      'Welcome...!',
      'This guide explains how to check your city weather.',
      'On the main page there is an input at the top right (left of the search icon).',
      'Click it and enter the city name you want.',
      'Then click the search button.',
      'You will see the weather for your city.',
      'You can hear the weather by clicking "Read Weather Information".',
      'Thank you...!'
    ];
    var typed = new Typed('#element', {
      strings: strings,
      typeSpeed: 50,
      onStringTyped: function (arrayPos) {
        speakText(strings[arrayPos]);
      }
    });
    function speakText(text) {
      const speech = new SpeechSynthesisUtterance(text);
      window.speechSynthesis.speak(speech);
    }
  </script>
</body>

</html>
