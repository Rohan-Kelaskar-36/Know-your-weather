<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Know Weather | Guide</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <!-- Typed.js -->
  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
    }

    #element {
      display: block;
      font-size: 1rem;
      margin-top: 1rem;
      line-height: 1.7;
      color: #eee;
    }

    .btn-modern {
      background-color: #ffc107;
      color: #000;
      font-weight: 600;
      border-radius: 30px;
      padding: 0.5rem 1.5rem;
      margin: 0.5rem;
      transition: 0.3s ease;
    }

    .btn-modern:hover {
      background-color: #e0a800;
      color: #000;
    }

    .header {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffd700;
    }

    img {
      max-height: 180px;
      border-radius: 1rem;
      object-fit: cover;
      margin-bottom: 1rem;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>
  <div class="glass-card">
    <img src="cartoon-sun.jpg" alt="Weather Icon" />
    <div class="header">Welcome to Know Weather 🌤️</div>
    <span id="element"></span>

    <div class="button-group">
      <a href="index.html" class="btn btn-modern">⬅ Go Back</a>
      <button id="mute-btn" class="btn btn-modern">🔊 Mute</button>
    </div>
  </div>

  <script>
    let isMuted = false;

    const muteBtn = document.getElementById('mute-btn');
    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      muteBtn.textContent = isMuted ? '🔇 Unmute' : '🔊 Mute';
      window.speechSynthesis.cancel(); // stop current speech
    });

    const strings = [
      'Hi there',
      'This guide helps you check your city\'s weather easily.',
      'On the main page, you\'ll see a search input at the top.',
      'Enter your city name and click the search button.',
      'The weather information will appear instantly.',
      'Click "Read Weather Info" to hear the details.',
      'Thank you for using Know Weather!'
    ];

    const typed = new Typed('#element', {
      strings: strings,
      typeSpeed: 50,
      backSpeed: 0,
      showCursor: false,
      smartBackspace: true,
      onStringTyped: (i) => {
        if (!isMuted) speakText(strings[i]);
      }
    });

    function speakText(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
